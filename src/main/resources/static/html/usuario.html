<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/usuario.css">
</head>
<body class="admin-page">

<div class="admin-wrapper">
    <div class="admin-content-grid">
        <section class="admin-section card">
            <h2><i class="fa-solid fa-user-plus"></i> Cadastro de Operador</h2>
            <form id="formCadastro" class="modern-form">

                <h3 class="form-section-title"><i class="fa-solid fa-address-card"></i> Identificação</h3>
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="nomeCompleto" placeholder="Ex: Dr. Carlos Alberto" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15">
                    </div>
                </div>

                <h3 class="form-section-title"><i class="fa-solid fa-user-doctor"></i> Dados Profissionais</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Conselho (CRM/COREN)</label>
                        <input type="text" id="conselho" placeholder="Ex: CRM/PR 12345">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Login</label>
                            <input type="text" id="login" required>
                        </div>
                        <div class="form-group">
                            <label>Perfil Base</label>
                            <select id="perfil" required>
                                <option value="MEDICO">Médico</option>
                                <option value="ENFERMEIRO">Enfermeiro</option>
                                <option value="ADMIN">Administrador</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Senha Inicial</label>
                        <input type="password" id="senha" required>
                    </div>

                    <input type="hidden" id="idUsuario">

                    <button type="submit" class="btn-primary">Gravar Operador</button>
            </form>
        </section>

        <section class="admin-section card">
            <h2><i class="fa-solid fa-users"></i> Operadores Ativos</h2>
            <div class="table-container">
                <table class="table-custom" id="tabelaUsuarios">
                    <thead>
                    <tr>
                        <th>Nome / Identificação</th>
                        <th>Perfil</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody id="lista-usuarios"></tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script src="../js/cadastro_usuario.js"></script>
</body>
</html>
